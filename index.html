<!DOCTYPE html>
<html lang="en-Uk">

<head>
    <title>Job Application Form</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Piyusha Patil" />
    <link rel="icon" type="image/png" href="./logo.avif">
    <link rel="stylesheet" href="./style.css" />
    <meta property="og:title" content="Job Application Form" />
    <meta property="og:type" content="website" />
</head>

<body>
    <main>
        <div class="container">
            <h1>Job Application Form</h1>
            <form action="https://httpbin.org/post" method="post" target="_blank">
                <label for="name">Full Name:</label>
                <input type="text" id="name" class="name" name="name" placeholder="Piyusha Patil" required>

                <label for="email">Email:</label>
                <input type="email" id="email" class="email" placeholder="piyushapatil2410.com" name="email" required>

                <label for="position">Job Position:</label>
                <select name="position" id="position" required>
                    <option value="none" disabled>-Select a Position-</option>
                    <option value="Full-Stack Developer">Full-Stack Developer</option>
                    <option value="Software Developer">Software Developer</option>
                    <option value="Database Administrators">Database Administrators</option>
                    <option value="UX Designer">UX Designer</option>
                    <option value="IT Project Manager">IT Project Manager</option>
                    <option value="Cloud Solution Architect">Cloud Solution Architect</option>
                    <option value="Data Anaytics">Data Anaytics</option>
                    <option value="Information Security Analyst">Information Security Analyst</option>
                    <option value="Cybersecurity Analyst">Cybersecurity Analyst</option>
                    <option value="Quality Assurance Analyst">Quality Assurance Analyst</option>
                    <option value="AI Engineer">AI Engineer</option>
                    <option value="Game Designer">Game Designer</option>
                </select>

                <fieldset class="radio-group">
                    <legend>Availability:</legend>
                    <input type="radio" id="full-time" name="availability" value="full-time" checked>
                    <label for="full-time"><span class="nowrap">Full-Time</span></label>
                    <input type="radio" id="part-time" name="availability" value="part-time">
                    <label for="part-time"><span class="nowrap">Part-time</span></label>
                </fieldset>

                <label for="message">Why do you want this job?</label>
                <textarea name="message" id="message" required placeholder="Type here..."></textarea>

                <button type="submit">Submit Application</button>
            </form>
        </div>
    </main>
</body>

</html>
